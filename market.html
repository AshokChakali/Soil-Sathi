<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Market Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }

        .navbar {
            background: #2c3e50;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .navbar h1 {
            margin: 0;
        }

        .container {
            text-align: center;
            margin-top: 40px;
        }

        input {
            padding: 10px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            margin-left: 10px;
            border: none;
            background: #3498db;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #2980b9;
        }

        .results {
            max-width: 800px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: none;
        }

        .mill {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
            cursor: pointer;
            text-align: left;
        }

        .mill:hover {
            background: #f0f8ff;
        }

        .details-card {
            margin-top: 20px;
            background: #fafafa;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
            text-align: left;
            position: relative;
            overflow: auto;
            /* Ensures float is contained */
        }

        /* Booking button aligned to the right side */
        .book-btn {
            background: #27ae60;
            margin-bottom: 10px;
            float: right;
            margin-left: 20px;
        }

        .book-btn:hover {
            background: #1e874b;
        }

        .back-btn {
            margin-top: 25px;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <h1>Market Analyzer</h1>
    </div>

    <div class="container" id="homePage">
        <h2>Find Mills by Location</h2>
        <input type="text" id="locationInput" placeholder="Enter location... (e.g. Hyderabad)">
        <button onclick="showMills()">Search</button>
    </div>

    <div class="results" id="resultsPage">
        <h2>Mills in <span id="locationName"></span></h2>
        <div id="millsList"></div>
        <div id="millDetails" class="details-card" style="display:none;"></div>
        <button class="back-btn" onclick="showMills()">⬅ Back</button>
    </div>

                },
                {

                },

                    reviews: 13
                }
            ]
        };

        function showMills() {
            const location = document.getElementById("locationInput").value.trim().toLowerCase();
            if (!location) return alert("Please enter a location");

            const mills = millsData[location] || [];
            document.getElementById("homePage").style.display = "none";
            document.getElementById("resultsPage").style.display = "block";
            document.getElementById("locationName").textContent = capitalize(location);
            document.getElementById("millDetails").style.display = "none";

            const list = document.getElementById("millsList");
            list.innerHTML = "";
            if (mills.length === 0) {
                list.innerHTML = "<p>No mills found for this location.</p>";
                return;
            }

            mills.forEach(mill => {
                const div = document.createElement("div");
                div.className = "mill";
                div.textContent = mill.name;
                div.onclick = () => showDetails(mill);
                list.appendChild(div);
            });
        }

        function showDetails(mill) {
            const details = document.getElementById("millDetails");
            details.style.display = "block";
            details.innerHTML = `
    <button class="book-btn" onclick="window.location.href='Booking.html'">Book Now</button>
    <h3>${mill.name}</h3>
    <p><b>Location:</b> ${mill.area}</p>
    <p><b>Price:</b> ${mill.pricePerQuintal}</p>
    <p><b>Rice Types:</b> ${mill.riceTypes.join(", ")}</p>
    <p><b>Details:</b> ${mill.details}</p>
    <p><b>Reviews:</b> ⭐ ${mill.avgRating} (${mill.reviews})</p
  `;
        }

        // function bookMill(name) {
        //     alert("Booking request sent for " + name + "!");
        // }

        function goBack() {
            document.getElementById("homePage").style.display = "block";
            document.getElementById("resultsPage").style.display = "none";
        }

        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }
    </script>
</body>

</html>
